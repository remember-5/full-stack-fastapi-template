services:
  traefik:
    image: traefik:3.6
    restart: always
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services.
      - --providers.docker
      # Add a constraint to only use services with the label for this stack.
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed.
      - --providers.docker.exposedbydefault=false
      # Create an HTTP-only entrypoint for intranet deployments.
      - --entrypoints.http.address=:80
      # Keep logs available for troubleshooting internal routing.
      - --accesslog
      - --log
      # Enable the Traefik dashboard on the internal management port.
      - --api
      - --api.insecure=true
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public

  adminer:
    labels: !override
      - traefik.enable=false

  backend:
    labels: !override
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=PathPrefix(`/api`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.priority=100
      - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=8000

  frontend:
    build:
      args:
        VITE_API_URL: ""
        NODE_ENV: production
    labels: !override
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.rule=PathPrefix(`/`)
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME?Variable not set}-frontend-http.priority=1
      - traefik.http.services.${STACK_NAME?Variable not set}-frontend.loadbalancer.server.port=80

networks:
  traefik-public:
    # Intranet deployments keep Traefik inside this Compose project instead of
    # requiring a pre-created shared public network.
    external: false
